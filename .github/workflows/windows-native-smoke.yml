          Assert-NativeCommand "git checkout vglyph failed"
        }
    - name: Install vglyph
      run: v install vglyph
    - name: Checkout gui
      uses: actions/checkout@v4
      with:
        path: gui
    - name: Run Windows setup preflight
      env:
        GUI_WINDOWS_PREFLIGHT_CC: clang
      run: v run gui/_windows_preflight.vsh
    - name: Run noninteractive native tests
      run: >
        v -no-parallel -cc clang test
        gui/_native_dialog_test.v
        gui/_native_print_test.v
        gui/_native_notification_test.v
        gui/nativebridge/_bridge_ex_test.v
        gui/nativebridge/_readback_abi_test.v
    - name: Compile native smoke examples
      run: |
        v -no-parallel -cc clang -W -o dialogs_smoke.exe gui/examples/dialogs.v
        v -no-parallel -cc clang -W -o printing_smoke.exe gui/examples/printing.v
        v -no-parallel -cc clang -W -o notification_smoke.exe gui/examples/native_notification.v
        if ('${{ inputs.run_d3d11 }}' -eq 'true') {
          $d3dExamples = @(
            @{ Name = 'printing'; Path = 'gui/examples/printing.v'; Warn = $true },
            @{ Name = 'gradient_demo'; Path = 'gui/examples/gradient_demo.v'; Warn = $true },
            @{ Name = 'shadow_demo'; Path = 'gui/examples/shadow_demo.v'; Warn = $true },
            @{ Name = 'blur_demo'; Path = 'gui/examples/blur_demo.v'; Warn = $true },
            @{ Name = 'image_clip'; Path = 'gui/examples/image_clip.v'; Warn = $true },
            @{ Name = 'svg_demo'; Path = 'gui/examples/svg_demo.v'; Warn = $true },
            @{ Name = 'custom_shader'; Path = 'gui/examples/custom_shader.v'; Warn = $true },
            @{ Name = 'showcase'; Path = 'gui/examples/showcase.v'; Warn = $false }
          )
          foreach ($example in $d3dExamples) {
            $args = @('-no-parallel', '-cc', 'clang', '-d', 'sokol_d3d11')
            if ($example.Warn) {
              $args += '-W'
            }
            $args += @('-o', "$($example.Name)_d3d11_smoke.exe", $example.Path)
            v @args
            if ($LASTEXITCODE -ne 0) {
              exit $LASTEXITCODE
            }
          }
        }

  mingw:
    name: MinGW native smoke (exploratory)
    runs-on: windows-latest
    timeout-minutes: 30
    continue-on-error: true
    if: ${{ !inputs.prewarm_deps_only && inputs.run_mingw }}
    steps:
    - name: Resolve V revision
      id: v
      shell: pwsh
      run: |
        $ErrorActionPreference = 'Stop'
        $revision = (git ls-remote https://github.com/vlang/v HEAD).Split()[0]
        "revision=$revision" | Add-Content -Path $env:GITHUB_OUTPUT
    - name: Restore V compiler cache
      id: restore-v-cache
      uses: actions/cache/restore@v4
      with:
        path: v
        key: windows-v-compiler-${{ steps.v.outputs.revision }}-v1
    - name: Install V
      id: install-v
      shell: pwsh
      run: |
        $ErrorActionPreference = 'Stop'
        function Assert-NativeCommand($Message) {
          if ($LASTEXITCODE -ne 0) {
            throw $Message
          }
        }
        $expectedRevision = '${{ steps.v.outputs.revision }}'
        if (Test-Path .\v\v.exe) {
          $cachedRevision = ( & git -C v rev-parse HEAD).Trim()
          Assert-NativeCommand "Could not inspect cached V revision"
          if ($cachedRevision -ne $expectedRevision) {
            Write-Host "Cached V revision $cachedRevision does not match expected $expectedRevision; rebuilding."
            Remove-Item -Recurse -Force .\v
          }
        }
        if (-not (Test-Path .\v\v.exe)) {
          if (Test-Path .\v) {
            Remove-Item -Recurse -Force .\v
          }
          git init v
          Assert-NativeCommand "git init failed"
          git -C v remote add origin https://github.com/vlang/v
          Assert-NativeCommand "git remote add failed"
          git -C v fetch --depth 1 origin $expectedRevision
          Assert-NativeCommand "git fetch failed"
          git -C v checkout --detach FETCH_HEAD
          Assert-NativeCommand "git checkout failed"
          Push-Location v
          cmd /c makev.bat
          if ($LASTEXITCODE -ne 0) {
            throw "makev.bat failed"
          }
          Pop-Location
        }
        $vPath = (Resolve-Path .\v).Path
        Add-Content -Path $env:GITHUB_PATH -Value $vPath
        $version = ( & .\v\v.exe version).Trim()
        $revision = ( & git -C v rev-parse HEAD).Trim()
        Assert-NativeCommand "Could not inspect V revision"
        "version=$version" | Add-Content -Path $env:GITHUB_OUTPUT
        "revision=$revision" | Add-Content -Path $env:GITHUB_OUTPUT
    - name: Log V version
      run: v version
    - name: Save V compiler cache
      if: ${{ steps.restore-v-cache.outputs.cache-hit != 'true' }}
      uses: actions/cache/save@v4
      with:
        path: v
        key: ${{ steps.restore-v-cache.outputs.cache-primary-key }}
    - name: Resolve vglyph revision
      id: vglyph
      shell: pwsh
      run: |
        $ErrorActionPreference = 'Stop'
        $revision = (git ls-remote https://github.com/vlang/vglyph HEAD).Split()[0]
        if ($LASTEXITCODE -ne 0) {
          throw "Could not resolve vglyph revision"
        }
        "revision=$revision" | Add-Content -Path $env:GITHUB_OUTPUT
    - name: Restore V module cache
      uses: actions/cache@v4
      with:
        path: ~/.vmodules/vglyph
        key: windows-vmodules-vglyph-${{ steps.install-v.outputs.revision }}-${{ steps.vglyph.outputs.revision }}-v2
        restore-keys: |
          windows-vmodules-vglyph-${{ steps.install-v.outputs.revision }}-
          windows-vmodules-vglyph-
    - name: Install MSYS2 MinGW dependencies
      uses: msys2/setup-msys2@v2
      with:
        msystem: MINGW64
        update: true
        path-type: inherit
        install: >-
          mingw-w64-x86_64-gcc
          mingw-w64-x86_64-pkgconf
          mingw-w64-x86_64-pango
          mingw-w64-x86_64-freetype
    - name: Verify V version in MSYS2
      shell: msys2 {0}
      run: |
        v_version="$(v version)"
        echo "$v_version"
    - name: Ensure vglyph revision
      shell: msys2 {0}
      run: |
        set -e
        expected_revision='${{ steps.vglyph.outputs.revision }}'
        vglyph_path="$HOME/.vmodules/vglyph"
        if [ -d "$vglyph_path/.git" ]; then
          cached_revision=$(git -C "$vglyph_path" rev-parse HEAD | tr -d '[:space:]')
          if [ "$cached_revision" != "$expected_revision" ]; then
            echo "Cached vglyph revision $cached_revision does not match expected $expected_revision; rebuilding."
            rm -rf "$vglyph_path"
          fi
        elif [ -e "$vglyph_path" ]; then
          rm -rf "$vglyph_path"
        fi
        if [ ! -e "$vglyph_path" ]; then
          mkdir -p "$(dirname "$vglyph_path")"
          git init "$vglyph_path"
          git -C "$vglyph_path" remote add origin https://github.com/vlang/vglyph
          git -C "$vglyph_path" fetch --depth 1 origin "$expected_revision"
          git -C "$vglyph_path" checkout --detach FETCH_HEAD
        fi
    - name: Checkout gui
      uses: actions/checkout@v4
      with:
        path: gui
    - name: Run Windows setup preflight
      shell: msys2 {0}
      env:
        GUI_WINDOWS_PREFLIGHT_CC: gcc
      run: v run gui/_windows_preflight.vsh
    - name: Run noninteractive native tests
      shell: msys2 {0}
      run: >
        v -no-parallel -cc gcc test
        gui/_native_dialog_test.v
        gui/_native_print_test.v
        gui/_native_notification_test.v
        gui/nativebridge/_bridge_ex_test.v
        gui/nativebridge/_readback_abi_test.v
    - name: Compile native smoke examples
      shell: msys2 {0}
      run: |
        v -no-parallel -cc gcc -W -o dialogs_smoke.exe gui/examples/dialogs.v
        v -no-parallel -cc gcc -W -o printing_smoke.exe gui/examples/printing.v
        v -no-parallel -cc gcc -W -o notification_smoke.exe gui/examples/native_notification.v
        if [ '${{ inputs.run_d3d11 }}' = 'true' ]; then
          for item in \
            'printing:gui/examples/printing.v:-W' \
            'gradient_demo:gui/examples/gradient_demo.v:-W' \
            'shadow_demo:gui/examples/shadow_demo.v:-W' \
            'blur_demo:gui/examples/blur_demo.v:-W' \
            'image_clip:gui/examples/image_clip.v:-W' \
            'svg_demo:gui/examples/svg_demo.v:-W' \
            'custom_shader:gui/examples/custom_shader.v:-W' \
            'showcase:gui/examples/showcase.v:'
          do
            IFS=':' read -r name path warn_flag <<< "$item"
            args=(-no-parallel -cc gcc -d sokol_d3d11)
            if [ -n "$warn_flag" ]; then
              args+=("$warn_flag")
            fi
            args+=(-o "${name}_d3d11_smoke.exe" "$path")
            v "${args[@]}"
            if [ "$?" -ne 0 ]; then
              exit 1
            fi
          done
        fi